name: Custom.Windows.DFIR.EvidenceCollector
description: |
  Runs the Windows PowerShell DFIR evidence collector from this repository
  and uploads the resulting case directory contents.

  This artifact is intended for Windows triage and reporting workflows.
type: CLIENT

parameters:
  - name: CaseId
    default: CASE-TRIAGE
  - name: Profile
    default: Incident
  - name: MaxDays
    default: "14"
  - name: IncludeBrowserArtefacts
    type: bool
    default: false
  - name: IncludeMemory
    type: bool
    default: false
  - name: IncludeYara
    type: bool
    default: false
  - name: ZipSharePackage
    type: bool
    default: true

tools:
  - name: dfir_collector_ps1
    url: https://raw.githubusercontent.com/nepttunus/windows-dfir-ecosystem/main/collector/windows/Invoke-DFIREvidenceCollector.ps1

sources:
  - precondition: |
      SELECT * FROM info() WHERE OS = 'windows'

    query: |
      LET tool <= SELECT FullPath, tempdir() AS TempDir
      FROM Artifact.Generic.Utils.FetchBinary(ToolName="dfir_collector_ps1")

      LET browser_flag <= if(condition=IncludeBrowserArtefacts, then=["-IncludeBrowserArtefacts"], else=[])
      LET memory_flag <= if(condition=IncludeMemory, then=["-IncludeMemory"], else=[])
      LET yara_flag <= if(condition=IncludeYara, then=["-IncludeYara"], else=[])
      LET share_flag <= if(condition=ZipSharePackage, then=["-ZipSharePackage"], else=[])

      LET argv <= array(
        a=[
          "powershell.exe",
          "-ExecutionPolicy", "Bypass",
          "-File", tool[0].FullPath,
          "-CaseId", CaseId,
          "-OutputRoot", tool[0].TempDir,
          "-Profile", Profile,
          "-MaxDays", MaxDays
        ],
        b=browser_flag,
        c=memory_flag,
        d=yara_flag,
        e=share_flag
      )

      LET execution <=
        SELECT *
        FROM execve(
          argv=argv,
          length=100000
        )

      LET uploads <=
        SELECT
          FullPath,
          upload(file=FullPath) AS Upload
        FROM glob(globs="**", root=tool[0].TempDir)

      SELECT * FROM chain(
        a={ SELECT * FROM execution },
        b={ SELECT * FROM uploads }
      )
